<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>안마의자 렌탈 상담</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background: #fff8f0;
      color: #222;
    }

    .wrap {
      width: 100%;
      max-width: 750px;
      margin: 0 auto;
      background: #ffffff;
    }

    .section {
      padding: 48px 28px;
      text-align: center;
    }

    .hero {
      background: linear-gradient(180deg, #fff1dc 0%, #ffffff 100%);
      padding: 64px 28px 48px;
    }

    .badge {
      display: inline-block;
      padding: 8px 16px;
      border-radius: 999px;
      background: #ffe0b8;
      color: #9a5600;
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0;
      font-size: 46px;
      line-height: 1.25;
      letter-spacing: -1.5px;
    }

    h2 {
      font-size: 38px;
      line-height: 1.3;
      margin: 0 0 20px;
      letter-spacing: -1px;
    }

    p {
      font-size: 26px;
      line-height: 1.55;
      margin: 14px 0;
      color: #444;
    }

    .point {
      background: #fff5e8;
      border-radius: 24px;
      padding: 28px;
      margin-top: 28px;
      text-align: left;
    }

    .point div {
      font-size: 26px;
      line-height: 1.6;
      margin: 12px 0;
    }

    .image-box {
      width: 100%;
      min-height: 420px;
      background: #f3f3f3;
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #999;
      font-size: 24px;
      margin: 32px 0;
    }

    .cta {
      position: sticky;
      bottom: 0;
      width: 100%;
      max-width: 750px;
      margin: 0 auto;
      padding: 18px 20px;
      background: rgba(255, 255, 255, 0.95);
      border-top: 1px solid #eee;
    }

    .cta a {
      display: block;
      width: 100%;
      padding: 24px 20px;
      border-radius: 18px;
      background: #ff8a00;
      color: #fff;
      text-decoration: none;
      font-size: 30px;
      font-weight: 800;
      text-align: center;
    }
  </style>
</head>

<body>
  <main class="wrap">
    <section class="hero">
      <div class="badge">부담 없는 렌탈 상담</div>
      <h1>부모님이 편하게 쓰는<br />안마의자 렌탈</h1>
      <p>구매 부담은 줄이고,<br />매일 집에서 편안하게 쉬세요.</p>

      <div class="image-box">
        디자인팀 이미지 들어갈 자리
      </div>
    </section>

    <section class="section">
      <h2>왜 렌탈로 많이 선택할까요?</h2>
      <div class="point">
        <div>✔ 초기 구매 비용 부담이 적어요</div>
        <div>✔ 상담 후 조건에 맞게 선택 가능해요</div>
        <div>✔ 부모님 선물용으로 문의가 많아요</div>
      </div>
    </section>

    <section class="section">
      <h2>상담만 받아도 괜찮아요</h2>
      <p>
        제품, 월 렌탈료, 설치 가능 여부를<br />
        편하게 확인해보세요.
      </p>
    </section>
  </main>

  <div class="cta">
    <a href="https://pf.kakao.com/" target="_blank">
      카카오톡 상담하기
    </a>
  </div>
</body>
</html>
